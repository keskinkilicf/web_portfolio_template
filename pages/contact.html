    <header>
        <nav>
            
            <ul class="nav-links">
                <li><a href="index.html">Ana Sayfa</a></li>
                <li><a href="about.html">Hakkımda</a></li>

            <a href="project.html">Projeler</a>
            <a href="contact.html">İletişim</a>
        </div>
    </header>

    <main class="container">
        <section class="contact-section glass">
            <h2>İletişime Geç</h2>
            <p>Projeler, işbirlikleri veya sadece merhaba demek için bana ulaşabilirsin.</p>
            
            <form class="contact-form">
                <div class="form-group">
                    <label for="name">Adınız</label>
                    <input type="text" id="name" required>
                </div>
                <div class="form-group">
                    <label for="email">E-posta Adresiniz</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label for="message">Mesajınız</label>
                    <textarea id="message" rows="5" required></textarea>
                </div>
                <button type="submit" class="btn primary-btn glass-btn">Gönder</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 L3xan. Tüm hakları saklıdır.</p>
    </footer>

    <script src="main.js"></script>
